config:
  user.user-data: |-
    #cloud-config
    packages:
      - pipewire
      - pipewire-pulseaudio
      - pipewire-alsa
      - wireplumber
      - wayland-protocols
      - libwayland-client0
      - libwayland-cursor0
      - libwayland-egl1
      - curl
      - wget
      - openssh-server
      - git
    users:
      - name: BLINCUSUSER
        plain_text_passwd: 'BLINCUSUSER'
        home: /home/BLINCUSUSER
        shell: /bin/bash
        lock_passwd: True
        gecos: BLINCUSFULLNAME
        groups: [adm, sudo]
        sudo: ALL=(ALL) NOPASSWD:ALL
        ssh_authorized_keys:
          - SSHKEY    
    write_files:
    - path: /usr/local/bin/mystartup.sh
      permissions: 0755
      content: |
        #!/bin/sh
        uid=$(id -u)
        run_dir=/run/user/$uid
        mkdir -p $run_dir && chmod 700 $run_dir && chown $uid:$uid $run_dir
        
        # Setup Wayland socket
        ln -sf /mnt/.container_wayland_socket $run_dir/wayland-0
        
        # Setup PipeWire sockets
        mkdir -p $run_dir/pulse
        ln -sf /mnt/.container_pipewire_socket $run_dir/pipewire-0
        ln -sf /mnt/.container_pipewire_pulse_socket $run_dir/pulse/native
        ln -sf /mnt/.container_wireplumber_socket $run_dir/wireplumber-0
        
        # Setup environment variables
        echo 'export WAYLAND_DISPLAY=wayland-0' >> /home/BLINCUSUSER/.bashrc
        echo 'export XDG_RUNTIME_DIR=/run/user/1000' >> /home/BLINCUSUSER/.bashrc
        echo 'export PIPEWIRE_RUNTIME_DIR=/run/user/1000' >> /home/BLINCUSUSER/.bashrc
        echo 'export PULSE_RUNTIME_PATH=/run/user/1000/pulse' >> /home/BLINCUSUSER/.bashrc
    - path: /usr/local/etc/mystartup.service
      content: |
        [Unit]
        After=local-fs.target
        [Service]
        Type=oneshot
        ExecStart=/usr/local/bin/mystartup.sh
        [Install]
        WantedBy=default.target
    runcmd:
    - mkdir -p /home/BLINCUSUSER/.config/systemd/user/default.target.wants
    - ln -s /usr/local/etc/mystartup.service /home/BLINCUSUSER/.config/systemd/user/default.target.wants/mystartup.service
    - ln -s /usr/local/etc/mystartup.service /home/BLINCUSUSER/.config/systemd/user/mystartup.service
    - chown -R BLINCUSUSER:BLINCUSUSER /home/BLINCUSUSER/.config
    - chown BLINCUSUSER:BLINCUSUSER /home/BLINCUSUSER/.bashrc
    - [ sh, -c, "[ -x /opt/scripts/init.sh ] && /opt/scripts/init.sh"]
devices:
  mygpu:
    gid: "44"
    type: gpu
  wayland-socket:
    path: /mnt/.container_wayland_socket
    source: /run/user/1000/wayland-0
    type: disk
  pipewire-socket:
    path: /mnt/.container_pipewire_socket
    source: /run/user/1000/pipewire-0
    type: disk
  pipewire-pulse-socket:
    path: /mnt/.container_pipewire_pulse_socket
    source: /run/user/1000/pulse/native
    type: disk
  wireplumber-socket:
    path: /mnt/.container_wireplumber_socket
    source: /run/user/1000/wireplumber-0
    type: disk
  xdg-runtime:
    path: /run/user/1000
    source: /run/user/1000
    type: disk
    readonly: false
description: "Debian cloud-init with Wayland and PipeWire Sharing"